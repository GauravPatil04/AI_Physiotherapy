<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>REHABMATE - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="min-h-screen bg-black flex flex-col items-center justify-center p-4 md:p-8">
        <div class="w-full max-w-sm flex flex-col items-center space-y-8 animate-enter">
            
            <!-- Header / Logo Section -->
            <div class="text-center space-y-2">
                <div class="mb-6 inline-flex items-center justify-center w-12 h-12 bg-white rounded-xl">
                    <iconify-icon icon="lucide:activity" class="text-black text-2xl"></iconify-icon>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Welcome back</h1>
                <p class="text-zinc-400 font-medium">to REHABMATE</p>
            </div>

            <!-- Login Form -->
            <form action="/login" method="post" class="w-full space-y-5">
                <div class="space-y-2">
                    <label for="email" class="text-sm font-medium text-zinc-300 ml-1">Email</label>
                    <div class="relative group">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 group-focus-within:text-blue-500 transition-colors">
                            <iconify-icon icon="lucide:mail" class="text-lg"></iconify-icon>
                        </span>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="name@company.com" 
                            required
                            class="input-dark w-full h-12 pl-12 pr-4 rounded-xl border text-white placeholder-zinc-600"
                        >
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex items-center justify-between ml-1">
                        <label for="password" class="text-sm font-medium text-zinc-300">Password</label>
                        <a href="#" id="forgot-password-link" class="text-xs text-blue-500 hover:text-blue-400 transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative group">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 group-focus-within:text-blue-500 transition-colors">
                            <iconify-icon icon="lucide:lock" class="text-lg"></iconify-icon>
                        </span>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                            class="input-dark w-full h-12 pl-12 pr-4 rounded-xl border text-white placeholder-zinc-600"
                        >
                    </div>
                </div>

                <button 
                    type="submit" 
                    id="login-btn-submit"
                    class="gradient-btn w-full h-12 text-white font-semibold rounded-xl mt-4 flex items-center justify-center gap-2"
                >
                    <span>Sign in</span>
                    <iconify-icon icon="lucide:arrow-right" class="text-lg"></iconify-icon>
                </button>
            </form>

            <!-- Divider -->
            <div class="w-full flex items-center gap-4">
                <div class="h-px flex-1 bg-zinc-800"></div>
                <span class="text-xs font-semibold text-zinc-500 tracking-widest uppercase">OR</span>
                <div class="h-px flex-1 bg-zinc-800"></div>
            </div>

            <!-- Social Login -->
            <div class="w-full space-y-3">
                <a 
                    href="/login/google" 
                    id="google-login-link"
                    class="flex items-center justify-center gap-3 w-full h-12 bg-transparent border border-zinc-800 rounded-xl text-zinc-300 font-medium hover:bg-zinc-900 hover:border-zinc-700 transition-all"
                >
                    <iconify-icon icon="logos:google-icon" class="text-xl"></iconify-icon>
                    <span>Continue with Google</span>
                </a>
                

            </div>

            <!-- Footer -->
            <p class="text-sm text-zinc-500 pt-4">
                Don't have an account? 
                <a href="/signup_page" id="signup-footer-link" class="text-blue-500 font-semibold hover:text-blue-400 hover:underline transition-all underline-offset-4 ml-1">Create account</a>
            </p>

            <!-- Compliance / Terms -->
            <div class="pt-8 text-center">
                <p class="text-[10px] uppercase tracking-widest text-zinc-600 leading-relaxed">
                    By continuing, you agree to our<br>
                    <a href="#" class="underline">Terms of Service</a> & <a href="#" class="underline">Privacy Policy</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
