<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>REHABMATE - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/signup.css">
</head>
<body>
    <div class="min-h-screen bg-black flex flex-col items-center justify-center p-4 md:p-8">
        <div class="w-full max-w-sm flex flex-col items-center space-y-8">
            <div class="text-center space-y-2">
                <div class="mb-6 inline-flex items-center justify-center w-12 h-12 bg-white rounded-xl">
                    <iconify-icon icon="lucide:user-plus" class="text-black text-2xl"></iconify-icon>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Create account</h1>
                <p class="text-zinc-400 font-medium">Join REHABMATE</p>
            </div>

            <form action="/signup" method="post" class="w-full space-y-5">
                <div class="space-y-2">
                    <label for="name" class="text-sm font-medium text-zinc-300 ml-1">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required class="input-dark w-full h-12 px-4 rounded-xl border text-white placeholder-zinc-600">
                </div>

                <div class="space-y-2">
                    <label for="email" class="text-sm font-medium text-zinc-300 ml-1">Email</label>
                    <input type="email" id="email" name="email" placeholder="name@company.com" required class="input-dark w-full h-12 px-4 rounded-xl border text-white placeholder-zinc-600">
                </div>

                <div class="space-y-2">
                    <label for="password" class="text-sm font-medium text-zinc-300 ml-1">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required class="input-dark w-full h-12 px-4 rounded-xl border text-white placeholder-zinc-600">
                </div>

                <button type="submit" class="gradient-btn w-full h-12 text-white font-semibold rounded-xl mt-4 flex items-center justify-center gap-2">
                    <span>Sign up</span>
                    <iconify-icon icon="lucide:arrow-right" class="text-lg"></iconify-icon>
                </button>
            </form>

            <p class="text-sm text-zinc-500 pt-2">
                Already have an account?
                <a href="/login_page" class="text-blue-500 font-semibold hover:text-blue-400 hover:underline transition-all underline-offset-4 ml-1">Sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
