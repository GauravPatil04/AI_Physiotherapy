<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>REHABMATE - Feedback</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/static/feedback.css">
</head>

<body>
    <div class="min-h-screen bg-black flex flex-col items-center justify-center p-4 md:p-12">

        <div class="w-full max-w-lg mb-4 flex items-center justify-between text-sm text-zinc-400">
            <span>Logged in as {{ user_name }}</span>
            <div class="flex gap-4">
                <a href="/history" class="hover:text-white transition-colors">History</a>
                <a href="/logout" class="hover:text-white transition-colors">Logout</a>
            </div>
        </div>

        <div class="w-full max-w-lg flex flex-col items-center space-y-10 animate-enter">

            <!-- Header -->
            <div class="text-center space-y-2">
                <div class="mb-6 inline-flex items-center justify-center w-12 h-12 bg-white rounded-xl">
                    <iconify-icon icon="lucide:message-square-plus" class="text-black text-2xl"></iconify-icon>
                </div>

                <h1 class="text-3xl font-bold text-white tracking-tight">
                    Help us improve
                </h1>

                <p class="text-zinc-400 font-medium">
                    Your feedback makes REHABMATE better
                </p>
            </div>

            <!-- Form -->
            <form action="/submit_feedback" method="post" class="w-full space-y-8">

                <!-- Rating -->
                <div class="space-y-4">
                    <label class="text-sm font-semibold text-zinc-300 ml-1 block">
                        1. How would you rate your overall experience? (1-5)
                    </label>

                    <div
                        class="flex justify-between items-center bg-[#0f0f0f] border border-[#262626] p-4 rounded-2xl">

                        <div class="flex gap-2">
                            <iconify-icon icon="lucide:star"
                                class="text-2xl text-zinc-600 star-btn cursor-pointer" id="star-1"></iconify-icon>
                            <iconify-icon icon="lucide:star"
                                class="text-2xl text-zinc-600 star-btn cursor-pointer" id="star-2"></iconify-icon>
                            <iconify-icon icon="lucide:star"
                                class="text-2xl text-zinc-600 star-btn cursor-pointer" id="star-3"></iconify-icon>
                            <iconify-icon icon="lucide:star"
                                class="text-2xl text-zinc-600 star-btn cursor-pointer" id="star-4"></iconify-icon>
                            <iconify-icon icon="lucide:star"
                                class="text-2xl text-zinc-600 star-btn cursor-pointer" id="star-5"></iconify-icon>
                        </div>

                        <span class="text-zinc-500 text-xs font-medium uppercase tracking-tighter">
                            Tap to rate
                        </span>

                        <input type="hidden" name="q1" id="rating-input" value="0" required>
                    </div>
                </div>

                <!-- Accuracy -->
                <div class="space-y-2">
                    <label for="accuracy" class="text-sm font-semibold text-zinc-300 ml-1">
                        2. Was the exercise tracking accurate?
                    </label>

                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500">
                            <iconify-icon icon="lucide:activity" class="text-lg"></iconify-icon>
                        </span>

                        <input type="text" id="accuracy" name="q2"
                            placeholder="e.g. Yes, very precise" required
                            class="input-dark w-full h-12 pl-12 pr-4 rounded-xl border text-white placeholder-zinc-600">
                    </div>
                </div>

                <!-- Interface -->
                <div class="space-y-2">
                    <label for="interface" class="text-sm font-semibold text-zinc-300 ml-1">
                        3. Was the interface easy to use?
                    </label>

                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500">
                            <iconify-icon icon="lucide:layout-template" class="text-lg"></iconify-icon>
                        </span>

                        <input type="text" id="interface" name="q3"
                            placeholder="e.g. Simple and intuitive" required
                            class="input-dark w-full h-12 pl-12 pr-4 rounded-xl border text-white placeholder-zinc-600">
                    </div>
                </div>

                <!-- Issues -->
                <div class="space-y-2">
                    <label for="issues" class="text-sm font-semibold text-zinc-300 ml-1">
                        4. Did you face any issues?
                    </label>

                    <textarea id="issues" name="q4" rows="3"
                        placeholder="Let us know if something didn't work..."
                        class="input-dark w-full p-4 rounded-xl border text-white placeholder-zinc-600 resize-none"></textarea>
                </div>

                <!-- Suggestions -->
                <div class="space-y-2">
                    <label for="suggestions" class="text-sm font-semibold text-zinc-300 ml-1">
                        5. Suggestions for improvement
                    </label>

                    <textarea id="suggestions" name="q5" rows="3"
                        placeholder="What features would you like to see?"
                        class="input-dark w-full p-4 rounded-xl border text-white placeholder-zinc-600 resize-none"></textarea>
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="gradient-btn w-full h-14 text-white font-bold rounded-xl mt-6 flex items-center justify-center gap-2 text-lg">
                    <span>Submit Feedback</span>
                    <iconify-icon icon="lucide:send" class="text-xl"></iconify-icon>
                </button>
            </form>

            <!-- Footer -->
            <div class="pt-4 text-center space-y-3">
                <a href="/dashboard" class="text-zinc-500 text-sm font-medium hover:text-white transition-colors flex items-center justify-center gap-2">
                    <iconify-icon icon="lucide:arrow-left" class="text-lg"></iconify-icon>
                    <span>Back to Dashboard</span>
                </a>
                <div class="flex items-center justify-center gap-5 text-sm">
                    <a href="/history" class="text-zinc-500 hover:text-white transition-colors">History</a>
                    <a href="/logout" class="text-zinc-500 hover:text-white transition-colors">Logout</a>
                </div>
            </div>

        </div>
    </div>
</body>

<script src="/static/feedback.js"></script>

</html>
